<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聊天页</title>
</head>
<body>
  <header>
    <h1>AI 学习助手</h1>
  </header>

  <main>
    <aside>
      <h2>历史会话</h2>
      <ul>
        <li>30天前端学习计划</li>
        <li>React 入门问题</li>
        <li>TypeScript 学习路线</li>
      </ul>
    </aside>

    <section>
      <h2>消息区域</h2>

      <div>
        <p><strong>你：</strong>帮我制定一个学习计划</p>
      </div>

      <div>
        <p><strong>AI：</strong>好的，我会先了解你的目标，再生成一个计划。</p>
      </div>
    </section>
  </main>

  <footer>
    <form>
      <input type="text" placeholder="请输入你的问题..." />
      <button type="submit">发送</button>
    </form>
  </footer>
</body>
</html>
